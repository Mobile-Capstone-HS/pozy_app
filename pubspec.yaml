name: pose_camera_app
description: 'A new Flutter project.'
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  camera: ^0.11.0
  image: ^4.2.0
  ultralytics_yolo:
    path: packages/ultralytics_yolo
  image_picker: ^0.8.7
  gal: ^2.3.2
  photo_manager: ^3.9.0
  sensors_plus: ^6.1.1
  permission_handler: any
  flutter_litert: ^2.0.7
  flutter_litert_flex: ^0.0.5
  google_generative_ai: ^0.4.6
  http: ^1.2.0
  flutter_dotenv: ^5.2.1
  flutter_naver_map: ^1.3.0
  geolocator: ^13.0.1
  google_mlkit_pose_detection: ^0.12.0
  google_mlkit_face_detection: ^0.11.0
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  cloud_functions: ^5.3.3
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.ttf
        - asset: assets/fonts/Pretendard-Medium.ttf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.ttf
          weight: 700

  assets:
    - .env
    - lib/assets/
    - assets/models/
    - assets/images/
